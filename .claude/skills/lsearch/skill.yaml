name: lsearch
description: Local RAG knowledge base for Claude Code - search your project docs with semantic + keyword hybrid search. Must run /lsearch-init first to initialize.
tools:
  - mcp__lsearch__init
  - mcp__lsearch__search
  - mcp__lsearch__search_with_context
  - mcp__lsearch__index
  - mcp__lsearch__fetch_url
  - mcp__lsearch__add_path
  - mcp__lsearch__list_paths
  - mcp__lsearch__get_stats
