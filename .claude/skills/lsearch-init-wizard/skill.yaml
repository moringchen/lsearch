name: lsearch-init-wizard
description: Initialize or reconfigure lsearch knowledge base with form-based configuration

When user runs /lsearch-init or says "initialize lsearch":

1. Check if already initialized by looking for .lsearch/config.yaml in current working directory

2. If initialized, show current configuration and let user choose to modify or keep:

   - Read the config file to get current settings
   - Call mcp__lsearch__list_paths to show configured paths
   - Call mcp__lsearch__get_stats to show index statistics

   Then ask user with AskUserQuestion:
   AskUserQuestion({
     questions: [{
       question: "Knowledge base already exists. What would you like to do?",
       header: "Action",
       options: [
         {label: "Keep current configuration", description: "No changes needed"},
         {label: "Modify configuration", description: "Update name, paths, or model via form"}
       ]
     }]
   })

3. If user chooses "Modify configuration" or if not initialized:

   Call mcp__lsearch__init with force=true to show the configuration form:
   - Name: Auto-generated or custom
   - Paths: Multi-select checkboxes for common paths + custom paths field
   - Model: Dropdown selection
   - Force Reinitialize: true (to overwrite existing)

4. After successful initialization, show success message and suggest next steps:
   - Run /lsearch-index to index documents
   - Run /lsearch <query> to start searching
